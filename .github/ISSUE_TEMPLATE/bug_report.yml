name: Bug Report
about: Report a reproducible defect
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve colony-harness.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Please provide exact steps.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 0.1.0
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      render: shell
